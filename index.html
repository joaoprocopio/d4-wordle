<!DOCTYPE html>

<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Wordle - The New York Times</title>
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="icon" href="img/favicon.ico" />
</head>

<body>

	<header>
		<div class="header-left">
			<button class="button-menu">
				<img src="./img/menu.svg" />
			</button>
			<button class="button-help">
				<img src="./img/circle-help.svg" />
			</button>
		</div>
		<div class="header-center">Wordle</div>
		<div class="header-right">
			<button class="button-statistics">
				<img src="./img/user-statistics.svg" />
			</button>
			<button class="button-settings">
				<img src="./img/settings.svg" />
			</button>
		</div>
	</header>

	<div class="game">

		<div class="board-container">
			<div class="board">
				<div class="row-board">
					<div class="block absent">w</div>
					<div class="block absent">o</div>
					<div class="block absent">r</div>
					<div class="block absent">l</div>
					<div class="block absent">d</div>
				</div>
				<div class="row-board">
					<div class="block present">c</div>
					<div class="block absent">r</div>
					<div class="block absent">a</div>
					<div class="block present">n</div>
					<div class="block correct">e</div>
				</div>
				<div class="row-board">
					<div class="block absent">d</div>
					<div class="block absent">a</div>
					<div class="block correct">n</div>
					<div class="block correct">c</div>
					<div class="block correct">e</div>
				</div>
				<div class="row-board">
					<div class="block absent">s</div>
					<div class="block correct">i</div>
					<div class="block correct">n</div>
					<div class="block correct">c</div>
					<div class="block correct">e</div>
				</div>
				<div class="row-board">
					<div class="block correct">m</div>
					<div class="block correct">i</div>
					<div class="block correct">n</div>
					<div class="block correct">c</div>
					<div class="block correct">e</div>
				</div>
				<div class="row-board">
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
				</div>
			</div>
		</div>

		<div class="keyboard-container">
			<div class="game-keyboard">
				<div class="row-keyboard">
					<button class="key">q</button>
					<button class="key absent">w</button>
					<button class="key correct">e</button>
					<button class="key absent">r</button>
					<button class="key">t</button>
					<button class="key">y</button>
					<button class="key">u</button>
					<button class="key correct">i</button>
					<button class="key absent">o</button>
					<button class="key">p</button>
				</div>
				<div class="row-keyboard">
					<div class="fake-padding"></div>
					<button class="key absent">a</button>
					<button class="key absent">s</button>
					<button class="key absent">d</button>
					<button class="key">f</button>
					<button class="key">g</button>
					<button class="key">h</button>
					<button class="key">j</button>
					<button class="key">k</button>
					<button class="key absent">l</button>
					<div class="fake-padding"></div>
				</div>
				<div class="row-keyboard">
					<button class="key-special">enter</button>
					<button class="key">z</button>
					<button class="key">x</button>
					<button class="key correct">c</button>
					<button class="key">v</button>
					<button class="key">b</button>
					<button class="key correct">n</button>
					<button class="key correct">m</button>
					<button class="key-special">
						<img src="./img/backspace.svg">
					</button>
				</div>
			</div>
		</div>

	</div>
</body>

</html>
