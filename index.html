<!DOCTYPE html>

<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Wordle</title>
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="icon" href="img/favicon.ico" />
</head>

<body>

	<header>
		<div class="header-left">
			<button class="button-menu">
				<img src="./img/menu.svg" />
			</button>
			<button class="button-help">
				<img src="./img/circle-help.svg" />
			</button>
		</div>
		<div class="header-center">Wordle</div>
		<div class="header-right">
			<button class="button-statistics">
				<img src="./img/user-statistics.svg" />
			</button>
			<button class="button-settings">
				<img src="./img/settings.svg" />
			</button>
		</div>
	</header>

	<div class=" game">
		<div class="board-container">
			<div class="board">
				<div class="row-board">
					<div class="block">W</div>
					<div class="block">O</div>
					<div class="block">R</div>
					<div class="block">L</div>
					<div class="block">D</div>
				</div>
				<div class="row-board">
					<div class="block wrong">C</div>
					<div class="block">R</div>
					<div class="block">A</div>
					<div class="block wrong">N</div>
					<div class="block correct">E</div>
				</div>
				<div class="row-board">
					<div class="block">D</div>
					<div class="block">A</div>
					<div class="block correct">N</div>
					<div class="block correct">C</div>
					<div class="block correct">E</div>
				</div>
				<div class="row-board">
					<div class="block">S</div>
					<div class="block correct">I</div>
					<div class="block correct">N</div>
					<div class="block correct">C</div>
					<div class="block correct">E</div>
				</div>
				<div class="row-board">
					<div class="block correct">M</div>
					<div class="block correct">I</div>
					<div class="block correct">N</div>
					<div class="block correct">C</div>
					<div class="block correct">E</div>
				</div>
				<div class="row-board">
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
				</div>
				<div class="row-board">
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
					<div class="block"></div>
				</div>
			</div>
		</div>
		<div class="game-keyboard">
			<div class="row-keyboard">
				<button class="key">q</button>
				<button class="key">w</button>
				<button class="key">e</button>
				<button class="key">r</button>
				<button class="key">t</button>
				<button class="key">y</button>
				<button class="key">u</button>
				<button class="key">i</button>
				<button class="key">o</button>
				<button class="key">p</button>
			</div>
			<div class="row-keyboard">
				<button class="key">a</button>
				<button class="key">s</button>
				<button class="key">d</button>
				<button class="key">f</button>
				<button class="key">g</button>
				<button class="key">h</button>
				<button class="key">j</button>
				<button class="key">k</button>
				<button class="key">l</button>
			</div>
			<div class="row-keyboard">
				<button class="key-special">enter</button>
				<button class="key">z</button>
				<button class="key">x</button>
				<button class="key">c</button>
				<button class="key">v</button>
				<button class="key">b</button>
				<button class="key">n</button>
				<button class="key">m</button>
				<button class="key-special">
					<img src="./img/backspace.svg">
				</button>
			</div>
		</div>
	</div>
</body>

</html>
